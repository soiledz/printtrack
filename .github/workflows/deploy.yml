name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Backend деплоится автоматически через Render (webhook от GitHub)
  # Frontend деплоится автоматически через Vercel (webhook от GitHub)
  # Этот workflow только проверяет что код компилируется

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Check backend TypeScript
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npx tsc --noEmit

      - name: Check frontend TypeScript
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
