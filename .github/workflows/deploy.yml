name: Check

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate --schema=../prisma/schema.prisma
          npx tsc --noEmit

      - name: Check frontend
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit